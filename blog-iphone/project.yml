name: BlogApp
options:
  bundleIdPrefix: com.siguofan
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  BlogApp:
    type: application
    platform: iOS
    sources:
      - BlogApp
    info:
      path: BlogApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siguofan.blog
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: BlogApp/Info.plist
        GENERATE_INFOPLIST_FILE: false
